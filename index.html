<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>鳥一代グループ 日報・週報システム</title>
<style>
  :root{--blue:#2b6cb0;--bg:#f2f4f7;--line:#dde3ea;--red:#c0392b;--green:#1e8e5a}
  *{box-sizing:border-box}
  body{font-family:-apple-system,"Hiragino Sans",sans-serif;background:var(--bg);margin:0;color:#2d3340;font-size:15px}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;padding-bottom:80px}
  header{position:sticky;top:0;background:var(--blue);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10}
  header b{font-size:15px}
  main{padding:16px}
  .card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}
  .card h3{margin:0 0 8px;font-size:14px}
  .btn{display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;text-align:center;cursor:pointer;margin-top:8px}
  .btn.sub{background:#fff;color:var(--blue);border:1px solid var(--blue)}
  .btn.sm{width:auto;display:inline-block;padding:7px 14px;font-size:13px;margin:4px 4px 0 0}
  .btn:disabled{opacity:.5}
  .chip{display:inline-block;border:1px solid var(--blue);color:var(--blue);border-radius:16px;padding:6px 14px;font-size:13px;margin:3px;cursor:pointer;user-select:none}
  .chip.on{background:var(--blue);color:#fff}
  .stars span{font-size:26px;color:#ccc;cursor:pointer;margin-right:4px}
  .stars span.on{color:#e8b400}
  textarea,input[type=text],input[type=email],input[type=password],input[type=date],select.inp{width:100%;border:1px solid #bbb;border-radius:8px;padding:10px;font-size:15px;margin-top:6px;font-family:inherit}
  .alert{background:#fdecec;color:var(--red);border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px}
  .info{background:#eaf3fd;color:#1a5c9e;border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px}
  .muted{color:#8a93a2;font-size:12px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid #f0f2f5;cursor:pointer;font-size:14px}
  .badge{background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:2px 8px}
  .badge.g{background:var(--green)}
  .badge.b{background:var(--blue)}
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto}
  nav button{flex:1;border:none;background:none;padding:10px 0 14px;font-size:11px;color:#8a93a2;cursor:pointer}
  nav button.on{color:var(--blue);font-weight:600}
  nav button i{display:block;font-size:20px;font-style:normal}
  .req{color:var(--red);font-size:12px}
  h2{font-size:17px;margin:4px 0 12px}
  .back{color:var(--blue);font-size:13px;cursor:pointer;margin-bottom:8px;display:inline-block}
  .cmt{background:#f6f8fa;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:13px}
  .seg{display:flex;border:1px solid var(--blue);border-radius:8px;overflow:hidden;margin-bottom:12px}
  .seg div{flex:1;text-align:center;padding:8px;font-size:13px;color:var(--blue);cursor:pointer}
  .seg div.on{background:var(--blue);color:#fff}
  .loginwrap{padding:40px 24px}
  .center{text-align:center}
  .spin{padding:40px;text-align:center;color:#8a93a2}
  nav button{position:relative}
  .ndot{position:absolute;top:2px;right:12px;background:var(--red);color:#fff;font-size:10px;min-width:16px;height:16px;line-height:16px;border-radius:8px;padding:0 4px;text-align:center}
  /* v1.6 入力部品 */
  .radio-row{display:block;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-top:6px;cursor:pointer;font-size:14px}
  .radio-row input{margin-right:8px}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .photo-grid .ph{position:relative;width:84px;height:84px;border-radius:8px;overflow:hidden;border:1px solid var(--line);display:block}
  .photo-grid .ph img{width:100%;height:100%;object-fit:cover}
  .photo-grid .ph .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:20px;height:20px;line-height:20px;text-align:center;font-size:12px;cursor:pointer}
  .addph{width:84px;height:84px;border:2px dashed #bbb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#8a93a2;font-size:26px;cursor:pointer}
  /* v1.6 フォームデザイナー */
  .fhandle{cursor:grab;color:#8a93a2;font-size:18px;padding:0 6px;user-select:none}
  .fnum{display:inline-block;background:#eaf3fd;color:var(--blue);border-radius:6px;font-size:12px;padding:2px 8px;font-weight:600}
  .fcard.dragover{outline:2px solid var(--blue);outline-offset:-2px}
  /* v1.6 PC 2カラムレイアウト */
  @media(min-width:900px){
   body.withnav .app{max-width:940px;margin:0 0 0 calc(max(0px, 50vw - 590px) + 240px);border-left:1px solid var(--line);border-right:1px solid var(--line);padding-bottom:24px}
   body.withnav nav{top:0;bottom:0;right:auto;left:max(0px, 50vw - 590px);width:240px;max-width:240px;flex-direction:column;justify-content:flex-start;border-top:none;border-right:1px solid var(--line);padding-top:14px}
   body.withnav nav:before{content:"🐔 鳥一代グループ";display:block;font-weight:700;font-size:15px;color:var(--blue);padding:10px 20px 18px}
   body.withnav nav button{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;text-align:left}
   body.withnav nav button i{display:inline-block;font-size:20px}
   body.withnav nav button.on{background:#eaf3fd}
   body.withnav .ndot{position:static;margin-left:auto}
   body.withnav main{padding:24px 36px}
   body.withnav header{padding:14px 36px}
   .loginwrap{max-width:480px;margin:0 auto}
  }
</style>
</head>
<body>
<div class="app" id="app"><div class="spin">読み込み中...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ===== Supabase =====
const SUPA_URL="https://uuvsxzhpxtghojoubjcc.supabase.co";
const SUPA_KEY="sb_publishable_MrwPJAx_Ws_fdRutprKCiQ_dg3wCiTr";
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

// ===== フォーマット定義（プロトタイプ準拠） =====
const ROLE_NAME={AL:"アルバイト",SHAIN:"社員",TENCHO:"店長",TEAM:"チーム長",HQ:"本部",CEO:"社長"};
const FORMATS={
 AL:[

  {k:"claim",label:"クレーム・トラブル",type:"select2",opts:["なし","あり"],req:true},

 ],
 TEAM:[

  {k:"eisei",label:"【兼任店舗】衛生・清掃チェック",type:"check",opts:["冷蔵・冷凍庫温度","食材期限・先入先出","手洗い・消毒","器具の洗浄消毒","床・排水溝清掃","トイレ清掃","ゴミ処理","害虫チェック"],kennin:true},
  {k:"claim",label:"【兼任店舗】クレーム・トラブル",type:"select2",opts:["なし","あり"],kennin:true},
  {k:"houkoku",label:"社長への報告",type:"task"}
 ],
 HQ:[
  {k:"work",label:"本日の業務内容",type:"text",req:true},
  {k:"progress",label:"担当業務の進捗",type:"text",req:true},
  {k:"kadai",label:"課題・相談",type:"text"},
  {k:"tomorrow",label:"明日の予定",type:"text"},
  {k:"houkoku",label:"社長への報告",type:"task"}
 ]
};
const WEEKLY_FMT=[
 {k:"summary",label:"今週の振り返り",type:"text",req:true},
 {k:"plan",label:"来週の重点・アクションプラン",type:"text",req:true}
];

// ===== 状態 =====
let me=null;          // {id,name,role,concurrent_role,stores:[{id,name}],team_id}
let stores=[];        // 全店舗
let page="home",detail=null,form={},seg="daily",editId=null,writeKind="daily";
let todayDaily=null,todayWeekly=null;
let appSettings={},setMode="main",fmtRole="AL",cfgJoin=null,cfgFmts=null,joinCfgCur=null;
let searchQ="",fRole="",fStore="";                       // v1.7 検索
let joinPhotos={},joinSmStaffs=null,joinInfoCur=null;    // v1.7 入社フォーム写真＋スマレジ選択
let smStaffsCache=null,smSel=null,smRole=null,smStores=[],smResult=null; // v1.7 スマレジ連携招待
let tskSeg="open",tskEdit=null,tskFiles=[],tskCmtFiles={},tskUsers=null; // v1.8 タスク
let chatRoom=null,chatNew=null,chatSeg="all",chatFiles=[],chatGm=[],chatDraft="",chatTimer=null,chatDescEdit=false,chatRename=false,chatMsgCount=0; // v1.9 チャット
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const fmtDate=s=>{if(!s)return"";const d=new Date(s+"T00:00:00");return (d.getMonth()+1)+"/"+d.getDate()+"("+"日月火水木金土"[d.getDay()]+")"};
const isKennin=()=>me&&me.concurrent_role==="TENCHO";
function toast(msg,isErr){
 let t=document.getElementById("toast");
 if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;max-width:90%;padding:11px 18px;border-radius:10px;font-size:14px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:opacity .3s";document.body.appendChild(t)}
 t.style.background=isErr?"var(--red)":"var(--green)";t.textContent=msg;t.style.opacity="1";
 clearTimeout(t._tm);t._tm=setTimeout(()=>{t.style.opacity="0"},2600);
}
const fmtAll=(role)=>((appSettings.formats&&appSettings.formats[role])||FORMATS[role]||[]);
const fmtFor=(role)=>fmtAll(role).filter(f=>!f.kennin||isKennin());
const weeklyFmt=()=>((appSettings.formats&&appSettings.formats.WEEKLY)||WEEKLY_FMT);
// 入社フォーム設定（標準項目キーと表示名）
const JOIN_STD=[["birth","生年月日"],["phone","電話番号"],["zip","郵便番号"],["addr","住所"],["ename","緊急連絡先の氏名"],["erel","緊急連絡先の続柄"],["ephone","緊急連絡先の電話"],["hire","入社日"]];
function joinCfg(src){
 const d={fields:{},custom:[]};
 JOIN_STD.forEach(([k])=>d.fields[k]={on:true,req:false});
 const c=src||appSettings.join_form;
 if(!c)return d;
 JOIN_STD.forEach(([k])=>{if(c.fields&&c.fields[k])d.fields[k]={on:!!c.fields[k].on,req:!!c.fields[k].req}});
 d.custom=(c.custom||[]).map(x=>({label:String(x.label||""),req:!!x.req,type:x.type||"text",opts:Array.isArray(x.opts)?x.opts:[]}));
 return d;
}
const JC_TYPES={text:"記入式",pull:"プルダウン",radio:"ラジオボタン",multi:"複数選択",photo:"写真添付"};
const JC_NOOPT=["text","photo"]; // 選択肢入力が不要な種類

// ===== 初期化 =====
const inviteToken=new URLSearchParams(location.search).get("invite");
async function init(){
 if(inviteToken){await renderJoin();return}
 const {data:{session}}=await sb.auth.getSession();
 if(!session){renderLogin();return}
 await loadMe(session.user.id);
}

// ===== 入社登録（招待リンクから本人が入力） =====
async function renderJoin(){
 document.getElementById("nav").style.display="none";
 document.body.classList.remove("withnav");
 $("app").innerHTML='<div class="spin">読み込み中...</div>';
 const {data:info,error}=await sb.rpc("get_invite_info",{p_token:inviteToken});
 if(error||!info||!info.ok){
  const msg=info&&info.reason==="used"?"この招待リンクは使用済みです":info&&info.reason==="expired"?"この招待リンクは期限切れです":"招待リンクが見つかりません";
  $("app").innerHTML=`<div class="loginwrap"><h2 class="center" style="font-size:20px">🐔 鳥一代グループ</h2>
   <div class="alert">${msg}。本部までお問い合わせください。</div></div>`;
  return;
 }
 const cfg=joinCfg(info.join_form);joinCfgCur=cfg;joinInfoCur=info;joinPhotos={};joinSmStaffs=null;
 const F=cfg.fields;
 const smLinked=!!info.smaregi_staff_id; // v1.7.1: スマレジ登録済みの人はアカウント登録のみ
 const mark=k=>F[k].req?' <span class="req">必須</span>':"";
 let h=`<div class="loginwrap" style="padding:24px 20px">
  <h2 class="center" style="font-size:20px">🐔 鳥一代グループ</h2>
  <p class="center muted" id="j-title">${smLinked?"アカウント登録":"入社登録フォーム"}</p>
  <div class="info">あなたの役職: <b>${ROLE_NAME[info.role]||info.role}</b>${(info.stores||[]).length?`<br>所属店舗: ${(info.stores||[]).map(esc).join("・")}`:""}${smLinked?`<br>🕐 スマレジ・タイムカード: <b>${esc(info.smaregi_staff_name||"")}</b>さんとして連携されます<br>すでにスマレジに登録済みのため、<b>アカウント登録だけ</b>で完了します`:""}</div>
  <div class="card"><h3>ログイン情報 <span class="req">必須</span></h3>
   <input type="email" id="j-email" placeholder="メールアドレス（ログインIDになります）" autocomplete="username">
   <input type="password" id="j-pw" placeholder="パスワード（8文字以上・自分で決める）" autocomplete="new-password"></div>`;
 if(!smLinked)h+=`<div class="card" id="j-smwrap" style="display:none"><h3>🕐 スマレジ・タイムカード</h3>
   <p class="muted" style="margin:0">すでにスマレジ・タイムカード（出勤打刻）に登録されている方は、自分の名前を選んでください。選ぶと打刻データと連携され、入社情報の入力は不要になります。</p>
   <select class="inp" id="j-smid"></select></div>`;
 h+=`<div class="card"><h3>基本情報 <span class="req">必須</span></h3>
   <input type="text" id="j-name" placeholder="氏名（例: 山田 太郎）" value="${esc(info.smaregi_staff_name||"")}">
   <input type="text" id="j-kana" placeholder="フリガナ（例: ヤマダ タロウ）" value="${esc(info.smaregi_staff_kana||"")}">`;
 if(!smLinked)h+=`<div data-joinsec>
   ${F.birth.on?`<p class="muted" style="margin:8px 0 0">生年月日${mark("birth")}</p><input type="date" id="j-birth">`:""}
   ${F.phone.on?`<input type="text" id="j-phone" placeholder="電話番号（例: 090-1234-5678)${F.phone.req?"※必須":""}">`:""}</div>`;
 h+=`</div>`;
 if(!smLinked){
  if(F.zip.on||F.addr.on)h+=`<div class="card" data-joinsec><h3>住所${(F.zip.req||F.addr.req)?' <span class="req">必須</span>':""}</h3>
    ${F.zip.on?`<input type="text" id="j-zip" placeholder="郵便番号（例: 108-0014）">`:""}
    ${F.addr.on?`<input type="text" id="j-addr" placeholder="住所">`:""}</div>`;
  if(F.ename.on||F.erel.on||F.ephone.on)h+=`<div class="card" data-joinsec><h3>緊急連絡先${(F.ename.req||F.erel.req||F.ephone.req)?' <span class="req">必須</span>':""}</h3>

    else h+=`<input type="text" data-jc="${i}">`;
   });
   h+=`</div>`;
  }
 }
 h+=`<button class="btn" id="j-submit">${smLinked?"アカウント登録する":"入社登録する"}</button>
  <p class="muted center" id="j-foot" style="margin-top:12px">${smLinked?"送信するとアカウントが作成されます（勤怠はスマレジ連携済み）":"送信すると本部・スマレジタイムカードに登録されます"}</p>
 </div>`;
 $("app").innerHTML=h;
 $("j-submit").onclick=doJoin;
 document.querySelectorAll(".chip[data-jmc]").forEach(c=>c.onclick=()=>c.classList.toggle("on"));
 cfg.custom.forEach((c,i)=>{if(c.type==="photo")renderJoinPhoto(i)});
 if(!info.smaregi_staff_id)loadJoinSm();
}
// v1.7: 入社フォームの写真（ローカル保持→登録後にアップロード）
function renderJoinPhoto(i){

function renderPhotoGrid(fk){

 wrap.innerHTML=arr.map((u,i)=>`<div class="ph"><img src="${esc(u)}"><span class="del" data-phdel="${fk}" data-i="${i}">✕</span></div>`).join("")+
